<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HackMatch - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-container-lowest": "#0f0d15",
                        "primary-fixed-dim": "#d0bcff",
                        "on-primary-container": "#340080",

<style>
        body {
            background-color: #000000;
            color: #e7e0ed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a078ff 0%, #6d3bd7 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        .btn-ghost {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            transition: all 0.3s ease;
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .skill-chip {
            background-color: #262354;
            color: #d0bcff;
            transition: all 0.2s ease;
        }
        .skill-chip:hover, .skill-chip.active {
            background-color: #340080;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        /* Hide nav shell for onboarding flow as per rules */
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Ambient Illumination -->
<div class="ambient-glow top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
<div class="ambient-glow bottom-0 right-0 translate-x-1/2 translate-y-1/2"></div>
<!-- Onboarding Container -->
<main class="w-full max-w-2xl px-margin md:px-0 relative z-10 flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-lg text-center">
<h1 class="font-h1 text-h1 text-primary tracking-tighter mb-xs">HackMatch</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Engineering Elite</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel w-full rounded-xl p-md md:p-lg shadow-[0_0_40px_rgba(0,0,0,0.8)] relative">
<!-- Progress Indicator -->
<div class="w-full flex items-center justify-between mb-lg relative"><div class="absolute top-1/2 left-0 w-full h-[2px] bg-outline-variant/30 -z-10 -translate-y-1/2"></div>
<div class="absolute top-1/2 left-0 w-1/3 h-[2px] bg-primary -z-10 -translate-y-1/2 shadow-[0_0_10px_rgba(208,188,255,0.5)]"></div>
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-primary/20 text-primary border border-primary/50 flex items-center justify-center font-bold text-sm">
<span class="material-symbols-outlined text-sm">check</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Skills</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold text-sm shadow-[0_0_15px_rgba(208,188,255,0.4)]">2</div>
<span class="font-label-caps text-label-caps text-primary">Interests</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant border border-outline-variant/50 flex items-center justify-center font-bold text-sm">3</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Role</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant border border-outline-variant/50 flex items-center justify-center font-bold text-sm">4</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Vibe</span>
</div></div>
<!-- Content Area: Step 1 -->
<div class="flex flex-col gap-md">
<div class="text-center">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Hackathon Categories</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select the types of projects and industries that interest you most.</p>
</div>
<!-- Skill Chips Container -->
<div class="flex flex-wrap gap-sm justify-center py-sm"><button class="skill-chip active rounded-full px-4 py-2 font-label-caps text-label-caps border border-primary/30 flex items-center gap-xs">
    AI/ML
</button>
<button class="skill-chip rounded-full px-4 py-2 font-label-caps text-label-caps border border-transparent flex items-center gap-xs">
    Web3 &amp; Crypto
</button>
<button class="skill-chip active rounded-full px-4 py-2 font-label-caps text-label-caps border border-primary/30 flex items-center gap-xs">
    FinTech
</button>
<button class="skill-chip rounded-full px-4 py-2 font-label-caps text-label-caps border border-transparent flex items-center gap-xs">
    Social Good
</button>
<button class="skill-chip rounded-full px-4 py-2 font-label-caps text-label-caps border border-transparent flex items-center gap-xs">
    Cybersecurity
</button>
<button class="skill-chip active rounded-full px-4 py-2 font-label-caps text-label-caps border border-primary/30 flex items-center gap-xs">
    Gaming
</button>
<button class="skill-chip rounded-full px-4 py-2 font-label-caps text-label-caps border border-transparent flex items-center gap-xs">
    HealthTech
</button>
<button class="skill-chip rounded-full px-4 py-2 font-label-caps text-label-caps border border-transparent flex items-center gap-xs">
    EdTech
</button></div>
<!-- Toggle -->
<div class="flex items-center justify-between p-sm rounded-lg bg-surface-container-lowest/50 border border-outline-variant/20 mt-sm">
<div class="flex flex-col"><span class="font-body-md text-body-md text-on-surface font-semibold">First-time Hacker?</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Let us know if you're new to hackathons so we can match you with beginner-friendly teams.</span></div>
<!-- Custom Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Actions -->
<div class="mt-lg flex items-center justify-between pt-md border-t border-outline-variant/20">
<button class="btn-ghost font-label-caps text-label-caps text-on-surface-variant px-md py-sm rounded-lg flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
                    Back
                </button>
<button class="btn-primary font-label-caps text-label-caps text-on-primary px-lg py-sm rounded-lg flex items-center gap-xs shadow-[0_0_20px_rgba(139,92,246,0.2)]">
                    Continue
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
